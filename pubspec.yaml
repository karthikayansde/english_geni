name: english_geni
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
# major, minor, and patch parts + build-number
version: 1.0.0+1
environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  get_storage: ^2.1.1
  flutter_secure_storage: ^10.3.1
  reactive_forms: ^18.2.2
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  app_links: ^7.2.0
  fl_chart: ^1.2.0
  supabase_flutter: ^2.15.4
  connectivity_plus: ^7.2.0
  internet_connection_checker_plus: ^3.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900